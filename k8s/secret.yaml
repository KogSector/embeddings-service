apiVersion: v1
kind: Secret
metadata:
  name: embeddings-service-secrets
  namespace: confuse
type: Opaque
stringData:
  # Service Secrets
  SERVICE_API_KEY: "embeddings_service_api_key_here"
  
  # Local LLM Configuration - No External APIs
  # All embeddings are generated locally via Ollama
  
  # Ollama Configuration (if auth needed)
  # OLLAMA_API_KEY: "ollama_api_key_here"
  
  # Encryption Keys
  ENCRYPTION_KEY: "32-byte-encryption-key-for-embeddings"
  
  # Database Secrets (if different from shared)
  # DATABASE_PASSWORD: "override_password_here"
