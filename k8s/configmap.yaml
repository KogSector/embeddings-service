apiVersion: v1
kind: ConfigMap
metadata:
  name: embeddings-service-config
  namespace: confuse
data:
  # Service Configuration
  PORT: "3001"
  HOST: "0.0.0.0"
  ENVIRONMENT: "production"
  
  # gRPC Configuration
  GRPC_PORT: "50054"
  GRPC_HOST: "0.0.0.0"
  
  # Kafka Configuration
  KAFKA_ENABLED: "true"
  KAFKA_GROUP_ID: "embeddings-service"
  KAFKA_CLIENT_ID: "embeddings-service"
  KAFKA_CHUNKS_TOPIC: "chunks.raw"
  KAFKA_EMBEDDINGS_TOPIC: "embedding.generated"
  
  # Processing Configuration
  BATCH_SIZE: "32"
  MAX_BATCH_SIZE: "128"
  EMBEDDING_DIM: "768"
  
  # Local LLM Models (downloaded and run via Ollama)
  DEFAULT_EMBEDDING_MODEL: "nomic-embed-text"
  
  # Performance Configuration
  MAX_CONCURRENT_BATCHES: "4"
  PROCESSING_TIMEOUT_SECONDS: "120"
  
  # Logging
  RUST_LOG: "embeddings_service=debug,tower_http=debug"
